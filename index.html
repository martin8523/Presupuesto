<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="presupuesto.css">
</head>
<body>
  <header>
    <div class="header-container">
      <img src="logo.png" alt="Logo Empresa" >
      <div class="encabezado-texto">
        <h2>Presupuesto por servicio Particular</h2>
        <p>Destinatario: <span><input type="text" id="destinatario-presupuesto"> </span></p>
        <p>Fecha: <span id="fecha"></span></p>
      </div>
    </div>
    <hr>
  </header>

  <main>
     <div class="container text-center" >
        <div class="row align-items-start" >          
          <div class="row" id="top">
            <div class="col"><label for="Detalle"> Detalle</label> </div>
            <div class="col"><label for="Cantidad"> Cantidad</label> </div>
            <div class="col"><label for="Precio"> Precio</label> </div>
            <div class="col"><label for="Sub"> Sub-total</label> </div>
          </div>
          <div id="detalle-items">
             </div>
        </div>
     </div>

    <div class="botones">
      <button id="btn-agregar" type="button" style="border-radius: 5% 35%">➕ Agregar ítem</button>
      <button id="btn-imprimir" type="button" style="border-radius: 35% 5%; padding: 5px 28px 5px 20px;">🖨️ Imprimir</button>
      <button id="btn-abrir-contrato" type="button" class="btn btn-primary" style="border-radius: 10px; padding: 5px 20px;">📜 Generar Contrato</button>
    </div>

    <div class="total">
      <strong>Total: $<span id="total">0.00</span></strong>
    </div>
  </main>

  <div class="modal fade" id="modalContrato" tabindex="-1" aria-labelledby="modalContratoLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content text-start">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title" id="modalContratoLabel">Datos para la Confección del Contrato</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="form-contrato">
            
            <h6 class="border-bottom pb-2 mb-3 text-secondary">Datos del Titular / Contratante</h6>
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="c-nombre" class="form-label">Nombre y Apellido / Razón Social</label>
                <input type="text" class="form-control" id="c-nombre" required>
              </div>
              <div class="col-md-6">
                <label for="c-dni" class="form-label">DNI / CUIT</label>
                <input type="text" class="form-control" id="c-dni" required>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="c-domicilio" class="form-label">Domicilio Legal</label>
                <input type="text" class="form-control" id="c-domicilio" placeholder="Calle, Número, Localidad" required>
              </div>
              <div class="col-md-6">
                <label for="c-telefono" class="form-label">Teléfono de Contacto</label>
                <input type="tel" class="form-control" id="c-telefono" required>
              </div>
            </div>

            <h6 class="border-bottom pb-2 mb-3 text-secondary mt-4">Condiciones de Pago</h6>
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="c-metodo-pago" class="form-label">Forma de Pago</label>
                <select class="form-select" id="c-metodo-pago" required>
                  <option value="" disabled selected>Seleccione una opción...</option>
                  <option value="Efectivo">Efectivo</option>
                  <option value="Transferencia Bancaria">Transferencia Bancaria</option>
                  <option value="Tarjeta de Crédito / Débito">Tarjeta de Crédito / Débito</option>
                  <option value="Financiado / Cuotas">Plan de Cuotas (Financiado)</option>
                </select>
              </div>
              <div class="col-md-6">
                <label for="c-observaciones" class="form-label">Detalle o Plan de Pago (Opcional)</label>
                <input type="text" class="form-control" id="c-observaciones" placeholder="Ej: Anticipo del 50% y saldo a 30 días">
              </div>
            </div>

          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
          <button type="button" id="btn-finalizar-contrato" class="btn btn-success">📦 Generar y Descargar PDF</button>
        </div>
      </div>
    </div>
  </div>

  <footer id="foot">
    <div class="container text-center">
      <div class="row align-items-start">
        <div class="col">12 de Octubre (7260) - Saladillo - Bs.As.</div>
        <div class="col">Tel: (2345) 65-3131</div>
        <div class="col">e-mail: serviciossociales@coopsal.com.ar - www.coopsal.com.ar/CESPAZ</div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

  <script src="presupuesto.js"></script>
</body>
</html>
