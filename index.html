<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="icon" href="logo.ico" type="image/x-icon">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Presupuesto</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="presupuesto.css">
</head>
<body>
  <header>
    <div class="header-container">
      <img src="logo.png" alt="Logo Empresa" >
      <div class="encabezado-texto">
        <h2>Presupuesto por servicio Particular</h2>
        <p style="margin-bottom: 5px;"><strong>Nro. Presupuesto: </strong><span id="nro-presupuesto-estampa" style="font-weight: bold; color: #e65c00;"></span></p>
        <p>Destinatario: <span><input type="text" id="destinatario-presupuesto"> </span></p>
        <p>Fecha: <span id="fecha"></span></p>
      </div>
    </div>
    <hr>
  </header>

  <main>
     <div class="container text-center" >
        <div class="row align-items-start" >          
          <div class="row" id="top">
            <div class="col"><label for="Detalle"> Detalle</label> </div>
            <div class="col"><label for="Cantidad"> Cantidad</label> </div>
            <div class="col"><label for="Precio"> Precio</label> </div>
            <div class="col"><label for="Sub"> Sub-total</label> </div>
          </div>
          <div id="detalle-items">
             </div>
        </div>
     </div>

    <div class="botones">
      <button id="btn-agregar" type="button">➕ Agregar ítem</button>
      <button id="btn-imprimir" type="button">🖨️ Imprimir</button>
      <button id="btn-abrir-contrato" type="button" class="btn btn-primary" style="border-radius: 10px; padding: 5px 20px;">📜 Generar Contrato</button>
    </div>

    <div class="total">
      <strong>Total: $<span id="total">0.00</span></strong>
    </div>
  </main>
  <div class="modal fade" id="modalContrato" tabindex="-1" aria-labelledby="modalContratoLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg">
      <div class="modal-content text-start">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title" id="modalContratoLabel">Datos para la Confección del Contrato</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="form-contrato">
            
            <h6 class="border-bottom pb-2 mb-3 text-secondary">Datos del Titular / Contratante</h6>
            <div class="row mb-3">
              <div class="col-md-6">
                <label for="c-nombre" class="form-label">Nombre y Apellido / Razón Social</label>
                <input type="text" class="form-control" id="c-nombre" required>
              </div>
              <div class="col-md-6">
                <label for="c-dni" class="form-label">DNI / CUIT</label>
                <input type="text" class="form-control" id="c-dni" required>
              </div>
            </div>

            <div class="row mb-3">
              <div class="col-md-6">
                <label for="c-domicilio" class="form-label">Domicilio Legal</label>
                <input type="text" class="form-control" id="c-domicilio" placeholder="Calle, Número, Localidad" required>
              </div>
              <div class="col-md-6">
                <label for="c-telefono" class="form-label">Teléfono de Contacto</label>
                <input type="tel" class="form-control" id="c-telefono" required>
              </div>
            </div>
            <div class="mb-3">
              <label for="metodoPago" class="form-label">Modalidad de Pago</label>
              <select class="form-select" id="metodoPago" onchange="evaluarModalidadPago()">
                <option value="Efectivo">Efectivo</option>
                <option value="Transferencia">Transferencia Bancaria</option>
                <option value="Efectivo y Transferencia">Efectivo y Transferencia</option>
                <option value="Plan de Pago Financiado">Plan de Pago Financiado</option>
              </select>
            </div>

            <div class="mb-3" id="contenedorCuotas" style="display: none; background-color: #f8f4fc; padding: 10px; border-radius: 6px; border: 1px solid #e1d5eb;">
              <label for="cantidadCuotas" class="form-label" style="color: #540d97; font-weight: bold;">Cantidad de Cuotas</label>
              <select class="form-select" id="cantidadCuotas">
                <option value="2">2 Cuotas</option>
                <option value="3" selected>3 Cuotas</option>
                <option value="4">4 Cuotas</option>
                <option value="6">6 Cuotas</option>
                <option value="9">9 Cuotas</option>
                <option value="12">12 Cuotas</option>
              </select>
            </div>

            <div class="form-check my-3 p-3 bg-light rounded border">
              <input class="form-check-input ms-0 me-2" type="checkbox" id="chkPreexistente" onchange="togglePresupuestoPreexistente()">
              <label class="form-check-label fw-bold text-secondary" for="chkPreexistente">
                Utilizar un Presupuesto Preexistente anterior
              </label>
              
              <div id="camposPreexistentes" class="mt-3" style="display: none;">
                <div class="row g-2">
                  <div class="col-6">
                    <label for="nroPresupuestoManual" class="form-label small fw-bold">Nro de Presupuesto anterior</label>
                    <input type="text" class="form-control form-control-sm" id="nroPresupuestoManual" placeholder="Ej: PR-123052026">
                  </div>
                  <div class="col-6">
                    <label for="montoManual" class="form-label small fw-bold">Monto Total ($)</label>
                    <input type="number" class="form-control form-control-sm" id="montoManual" placeholder="Ej: 1500000">
                  </div>
                </div>
              </div>
            </div>

<script>
// Función para mostrar/ocultar el selector de cuotas en el modal
function evaluarModalidadPago() {
  const metodo = document.getElementById("metodoPago").value;
  const contenedor = document.getElementById("contenedorCuotas");
  if (metodo === "Plan de Pago Financiado") {
    contenedor.style.display = "block";
  } else {
    contenedor.style.display = "none";
  }
}

// NUEVO: Función para mostrar/ocultar campos de presupuesto preexistente
function togglePresupuestoPreexistente() {
  const chk = document.getElementById("chkPreexistente");
  const contenedor = document.getElementById("camposPreexistentes");
  if (chk && contenedor) {
    contenedor.style.display = chk.checked ? "block" : "none";
  }
}
</script>

          </form>
        </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
            <button type="button" id="btnImprimirContrato" class="btn btn-primary" style="background-color: #540d97; border-color: #540d97;">🖨️ Imprimir Documentos</button>
          </div>
        </div>
    </div>
  </div>

  <footer id="foot">
    <div class="container text-center">
      <div class="row align-items-start">
        <div class="col">12 de Octubre (7260) - Saladillo - Bs.As.</div>
        <div class="col">Tel: (2345) 65-3131</div>
        <div class="col">e-mail: serviciossociales@coopsal.com.ar - www.coopsal.com.ar/CESPAZ</div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="presupuesto.js"></script>
</body>
</html>
